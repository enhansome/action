name: release

# Releases are cut from the `release/v1` lane, not `main`.
#
#   main         -> action.yml image: 'Dockerfile'  (CI/local build at runtime)
#   release/v1   -> action.yml image: 'docker://ghcr.io/enhansome/enhance-readme:v<ver>'
#                   (release-please bumps <ver> via the x-release-please block markers
#                   in that file; consumers pulling `@v1.0.x` get the prebuilt image)
#
# Manual sync: before a release, merge `main` into `release/v1`. action.yml
# auto-resolves to the pinned image — `main` never edits that line, so the merge
# never conflicts on it.

on:
  push:
    branches:
      - release/v1
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.PAT_FOR_RELEASES }}
          target-branch: release/v1

  # Build + push the prebuilt image that action.yml (on release/v1) points at.
  build-image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/enhansome/enhance-readme
          tags: |
            type=raw,value=v${{ needs.release-please.outputs.version }}
            type=raw,value=v${{ needs.release-please.outputs.major }}
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Move the major (vN) and minor (vN.M) git tags so `uses: enhansome/action@v1`
  # resolves to the latest release commit — whose action.yml pins the image.
  update-major-tag:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT_FOR_RELEASES }}
          fetch-depth: 0

      - name: Update and push major/minor tags
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MAJOR="v${{ needs.release-please.outputs.major }}"
          MINOR="v${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}"
          echo "Pointing $MAJOR, $MINOR -> ${{ needs.release-please.outputs.tag_name }}"

          # Delete any existing major/minor tags locally and on the remote.
          git tag -d "$MAJOR" 2>/dev/null || true
          git tag -d "$MINOR" 2>/dev/null || true
          git push origin ":$MAJOR" 2>/dev/null || true
          git push origin ":$MINOR" 2>/dev/null || true

          git tag -a "$MAJOR" -m "Release $MAJOR"
          git tag -a "$MINOR" -m "Release $MINOR"
          git push origin "$MAJOR"
          git push origin "$MINOR"
