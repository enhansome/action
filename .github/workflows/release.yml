name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.PAT_FOR_RELEASES }}

  # Move the major (vN) and minor (vN.M) git tags so `uses: enhansome/action@v1`
  # resolves to the latest release commit.
  update-major-tag:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT_FOR_RELEASES }}
          fetch-depth: 0

      - name: Update and push major/minor tags
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MAJOR="v${{ needs.release-please.outputs.major }}"
          MINOR="v${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}"
          echo "Pointing $MAJOR, $MINOR -> ${{ needs.release-please.outputs.tag_name }}"

          # Delete any existing major/minor tags locally and on the remote.
          git tag -d "$MAJOR" 2>/dev/null || true
          git tag -d "$MINOR" 2>/dev/null || true
          git push origin ":$MAJOR" 2>/dev/null || true
          git push origin ":$MINOR" 2>/dev/null || true

          git tag -a "$MAJOR" -m "Release $MAJOR"
          git tag -a "$MINOR" -m "Release $MINOR"
          git push origin "$MAJOR"
          git push origin "$MINOR"
