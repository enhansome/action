name: test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Both test layers in one file:
#  - unit: hermetic vitest suite + tsc (no network, no token)
#  - e2e:  the workflow itself - orchestration + the composite action + asserts
#          (run locally via `make e2e`; anonymous, no token needed)
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24.12.0'
          cache: npm
      - run: npm ci
      - run: npm run build          # tsc - typecheck
      - run: npm test               # vitest (hermetic; mocks the GitHub API)

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The action fetches the source list from `original_repository` itself:
      # checkout → action → assert.
      - name: Enhance
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          markdown_file: README.md
          working_directory: '.'
          original_repository: NARKOZ/guides
          auto_commit: false # local/act runner can't push; assert on file content

      - name: Assert output (shape, not values)
        run: |
          set -e
          python3 - <<'PY'
          import json
          d = json.load(open("README.json"))
          assert isinstance(d.get("items"), list) and len(d["items"]) > 0, "items missing/empty"
          got = d["metadata"]["original_repository"]
          assert got == "NARKOZ/guides", f"original_repository={got!r}"
          sha = d["metadata"]["original_repository_sha"]
          assert isinstance(sha, str) and len(sha) == 40, f"original_repository_sha={sha!r}"
          print("README.json OK:", len(d["items"]), "sections, sha", sha[:7])
          PY
          grep -q '⭐' README.md && echo "README.md has star badge"
