name: 'Enhance Markdown with GitHub Stars'
description: 'Parses a markdown file, finds GitHub repo links, and appends star counts.'
author: 'enhansome'

inputs:
  github_token:
    description: 'GitHub token for API calls. If omitted, metadata is fetched anonymously (rate-limited).'
    required: false
  markdown_file:
    description: 'Path to the markdown file to process (relative to working_directory).'
    required: true
    default: 'README.md'
  working_directory:
    description: 'The directory where the markdown file is located and where the action should operate.'
    required: false
    default: '.'
  json_output_file:
    description: |
      Path to save the generated JSON file in the source repository.
      If set to 'auto', the filename is derived from the markdown file (e.g., README.md -> README.json).
      If empty, no JSON file is generated in the source repository.
    required: false
    default: 'auto'
  find_and_replace:
    description: |
      Multiline list of literal string replacements.
      Each line should be in the format: `find_string:::replace_string`.
    required: false
  regex_find_and_replace:
    description: |
      Multiline list of regex-based replacements.
      Each line should be in the format: `pattern:::replacement_string`.
      The pattern is a case-sensitive regex with `gm` flags applied.
    required: false
  disable_branding:
    description: "Set to 'true' to disable the default behavior of appending ' with stars' to Awesome list titles."
    required: false
    default: 'false'
  sort_by:
    description: "Sorts lists that meet the threshold. Options: 'stars' or 'last_commit'. Leave empty to disable sorting."
    required: false
    default: ''
  relative_link_prefix:
    description: 'A path prefix to prepend to all relative links. Useful when content is moved from a subdirectory.'
    required: false
    default: ''
  original_repository:
    description: 'The original/submodule repository in owner/repo format that is being enhanced (e.g., owner/repo).'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: '24.12.0'

    - name: Compute build cache key
      id: cachekey
      shell: bash
      run: |
        hash=$(find \
          "${{ github.action_path }}/src" \
          "${{ github.action_path }}/package-lock.json" \
          "${{ github.action_path }}/tsconfig.json" \
          -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -d' ' -f1)
        echo "hash=$hash" >> "$GITHUB_OUTPUT"

    - name: Restore deps + build cache
      id: cache
      uses: actions/cache@v6
      with:
        path: |
          ${{ github.action_path }}/node_modules
          ${{ github.action_path }}/dist
        key: enhansome-action-${{ runner.os }}-${{ runner.arch }}-${{ steps.cachekey.outputs.hash }}

    - name: Install dependencies and build
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        npm ci
        npm run build

    - name: Enhance markdown
      shell: bash
      working-directory: ${{ github.workspace }}/${{ inputs.working_directory }}
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_MARKDOWN_FILE: ${{ inputs.markdown_file }}
        INPUT_JSON_OUTPUT_FILE: ${{ inputs.json_output_file }}
        INPUT_FIND_AND_REPLACE: ${{ inputs.find_and_replace }}
        INPUT_REGEX_FIND_AND_REPLACE: ${{ inputs.regex_find_and_replace }}
        INPUT_DISABLE_BRANDING: ${{ inputs.disable_branding }}
        INPUT_SORT_BY: ${{ inputs.sort_by }}
        INPUT_RELATIVE_LINK_PREFIX: ${{ inputs.relative_link_prefix }}
        INPUT_ORIGINAL_REPOSITORY: ${{ inputs.original_repository }}
      run: node "${{ github.action_path }}/dist/main.js"
